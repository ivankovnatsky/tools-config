include:
  - ../shared/base.yaml
  - ../shared/darwin.yaml

paths:
  uv: /opt/homebrew/bin
  uvBin: /Volumes/Storage/Data/.local/bin
  uvToolDir: /Volumes/Storage/Data/.local/share/uv/tools
  nodejs: /opt/homebrew/bin
  npmBin: /Volumes/Storage/Data/.npm/bin
  bunBin: /Volumes/Storage/Data/.bun/bin
  bun: /Volumes/Storage/Data/.bun/bin

npm:
  packages:
    openclaw:
      binary: openclaw
      version: latest
      postInstall: "node scripts/postinstall-bundled-plugins.mjs"

uv:
  packages:
    osxphotos:
      binary: osxphotos
    ruff:
      binary: ruff

files:
  # Inherit the shared dir-walk for dotfiles. YAML lists replace on
  # deep-merge, so we restate it here alongside the per-file entries.
  - dir: dotfiles
  - target: ~/.claude/settings.json
    source: dotfiles/.claude/settings.json
    mode: "0644"
  - target: ~/.local/bin/claude-statusline
    source: machines/Ivans-Mac-mini/.local/bin/claude-statusline
    mode: "0755"

brew:
  environment:
    HOMEBREW_NO_ENV_HINTS: "1"
  onActivation:
    autoUpdate: false
    cleanup: zap
  caskArgs:
    no_quarantine: true
  taps:
    - pomdtr/homebrew-tap
    - ivankovnatsky/homebrew-tap
    - keith/homebrew-formulae
    - antoniorodr/homebrew-memo
    - xwmx/homebrew-taps
  brews:
    - node
    - ollama
    - pam-reattach
    - uv
  casks:
    - chromium
    - firefox
    - ghostty
    - hammerspoon
    - kitty
    - mac-mouse-fix
    - obsidian
    - silicon-labs-vcp-driver
  masApps:
    Numbers: 409203825
    Pages: 409201541
    Bitwarden: 1352778147
