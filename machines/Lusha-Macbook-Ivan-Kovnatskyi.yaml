include:
  - ../shared/base.yaml
  - ../shared/darwin.yaml

npm:
  configFile: |
    prefix=~/.npm

bun:
  packages:
    npm-groovy-lint:
      binary: npm-groovy-lint
    mdts:
      binary: mdts
    md-fileserver:
      binary: mdstart

gitRepos:
  "~/.agents/skills/terraform-skill": "https://github.com/antonbabenko/terraform-skill"

mcp:
  servers:
    context7:
      transport: http
      url: "https://mcp.context7.com/mcp"
    playwright:
      transport: stdio
      args:
        - npx
        - "@playwright/mcp@latest"
