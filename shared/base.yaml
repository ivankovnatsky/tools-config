stateFile: ~/.local/state/tools/state.json

npm:
  packages:
    "@google/gemini-cli":
      binary: gemini
    "@openai/codex":
      binary: codex

uv:
  packages:
    tools:
      source: git+https://github.com/ivankovnatsky/tools.git
      binary: tools

go:
  packages:
    rclone:
      source: github.com/rclone/rclone
      binary: rclone

files:
  - dir: dotfiles

curlShell:
  "https://claude.ai/install.sh": bash
